name: Build & Deploy to GitHub Pages
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build the site
        run: npm run build
      - name: Show dist folder structure (debug)
        run: find dist -maxdepth 3
      - name: Detect output folder, add CNAME and 404.html
        run: |
          OUTDIR=$(dirname "$(find dist -name index.html | head -n 1)")
          echo "Detected build output folder: $OUTDIR"
          cp CNAME "$OUTDIR/CNAME"
          cp "$OUTDIR/index.html" "$OUTDIR/404.html"
          echo "OUTDIR=$OUTDIR" >> "$GITHUB_ENV"
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.OUTDIR }}
          publish_branch: gh-pages
